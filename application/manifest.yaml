apiVersion: v1
kind: Namespace
metadata:
  name: particle41-dev
  labels:
    app: particle41
    environment: dev

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: simpletimeservice
  namespace: particle41-dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simpletimeservice
  template:
    metadata:
      labels:
        app: simpletimeservice
    spec:
      containers:
        - name: simpletimeservice
          image: maheshjonnalagadda/simpletestservice:v1
          ports:
            - containerPort: 3000
          resources:
            limits:
              cpu: "200m"
              memory: "128Mi"
            requests:
              cpu: "100m"
              memory: "64Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: simpletimeservice
  namespace: particle41-dev
spec:
  type: NodePort
  selector:
    app: simpletimeservice
  ports:
    - name: http
      port: 80
      targetPort: 3000
    